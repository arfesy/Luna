<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna | Lencería de Autor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --gold: #c5a059; 
            --dark: #1a1a1a; 
            --light-pink: #fff5f6; 
            --white: #ffffff;
            --bg-image: url('https://images.unsplash.com/photo-1518171050893-99933100693a?q=80&w=1920&auto=format&fit=crop'); 
        }

        body { 
            font-family: 'Playfair Display', serif;
            margin: 0; 
            color: var(--dark);
            background-image: var(--bg-image);
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.85);
            z-index: -1;
        }

        header { 
            background: rgba(26, 26, 26, 0.95);
            color: var(--white); 
            padding: 70px 20px; 
            text-align: center;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header h1 { font-size: 3.5rem; letter-spacing: 10px; margin: 0; font-weight: 300; }
        header p { letter-spacing: 4px; font-size: 0.95rem; opacity: 0.8; margin-top: 15px; }

        .container { max-width: 1100px; margin: auto; padding: 50px 20px; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 40px; 
        }

        .product-card { 
            background: var(--white);
            border: 1px solid #eee;
            padding: 0 0 25px 0;
            text-align: center;
            transition: all 0.3s ease;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .product-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.1); 
            border-color: var(--gold);
        }

        .product-img { 
            width: 100%; 
            height: 380px; 
            object-fit: cover;
            background-color: #f9f9f9;
        }

        .product-info { padding: 20px; }
        .product-info h3 { margin: 10px 0; font-size: 1.3rem; font-weight: 400; }
        .price { color: var(--gold); font-size: 1.4rem; margin-bottom: 25px; display: block; font-weight: bold; }

        .btn-pay { 
            background: var(--dark); 
            color: var(--white); 
            padding: 14px 35px; 
            text-decoration: none; 
            display: inline-block; 
            border-radius: 0; 
            font-size: 0.9rem;
            letter-spacing: 2px;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn-pay:hover { 
            background: var(--gold); 
            color: var(--dark);
        }

        .footer { 
            background: rgba(26, 26, 26, 0.95);
            color: var(--white);
            padding: 60px 20px; 
            text-align: center; 
            margin-top: 80px;
        }

        .social-links { margin-top: 25px; }
        .social-links a { 
            font-size: 2rem; 
            margin: 0 20px; 
            color: var(--white); 
            transition: color 0.3s ease; 
        }

        .social-links .fa-whatsapp:hover { color: #25d366; }
        .social-links .fa-instagram:hover { color: #e1306c; }
        
        .whatsapp-float {
            position: fixed;
            width: 60px; height: 60px;
            bottom: 40px; right: 40px;
            background-color: #25d366;
            color: #FFF;
            border-radius: 50px;
            text-align: center;
            font-size: 30px;
            box-shadow: 2px 2px 3px #999;
            z-index: 100;
            display: flex; justify-content: center; align-items: center;
            text-decoration: none;
            transition: transform 0.3s;
        }
        .whatsapp-float:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<header>
    <h1>LUNA</h1>
    <p>Lo mejor • Lencería de diseño</p>
</header>

<div class="container">
    <div class="grid">
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1516715103130-f8447d2f9b87?q=80&w=400&auto=format&fit=crop" class="product-img" alt="Conjunto Seda Noir">
            <div class="product-info">
                <h3>Conjunto Seda Noir</h3>
                <span class="price">$18.900</span>
                <a href="https://wa.me/5492284231261?text=Hola%20Luna!%20Me%20interesa%20el%20Conjunto%20Seda%20Noir" class="btn-pay" target="_blank">ENCARGAR POR WHATSAPP</a>
            </div>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1549437149-14a90961805b?q=80&w=400&auto=format&fit=crop" class="product-img" alt="Body Encaje Rose">
            <div class="product-info">
                <h3>Body Rose Lace</h3>
                <span class="price">$22.500</span>
                <a href="https://wa.me/5492284231261?text=Hola%20Luna!%20Me%20interesa%20el%20Body%20Rose%20Lace" class="btn-pay" target="_blank">ENCARGAR POR WHATSAPP</a>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    <h3>¿Dudas con tu talle? Escribinos</h3>
    <div class="social-links">
        <a href="https://wa.me/5492284231261" target="_blank"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.instagram.com/melisadicampli/" target="_blank"><i class="fab fa-instagram"></i></a>
    </div>
    <p style="margin-top: 40px; font-size: 0.85rem; opacity: 0.6;">&copy; 2024 Luna Lencería. Todos los derechos reservados.</p>
</footer>

<a href="https://wa.me/5492284231261" class="whatsapp-float" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

</body>
</html>
